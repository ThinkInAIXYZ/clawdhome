name: Setup Tauri Build Environment
description: Install Rust, Node.js, npm dependencies, and platform packages for Tauri builds

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "20"
  rust-version:
    description: Rust toolchain version to install
    required: false
    default: "1.91.0"
  rust-target:
    description: Optional extra Rust target triple
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust stable
      if: ${{ inputs.rust-target == '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-version }}

    - name: Install Rust stable with extra target
      if: ${{ inputs.rust-target != '' }}
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-version }}
        targets: ${{ inputs.rust-target }}

    - name: Install protoc (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: brew install protobuf

    - name: Install system packages (Ubuntu)
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          protobuf-compiler

    - name: Install protoc (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: pwsh
      run: choco install protoc -y

    - name: Restore Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install frontend dependencies
      shell: bash
      run: npm ci
